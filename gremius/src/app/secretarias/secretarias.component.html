<!-- HERO -->
<div class="sec-hero">
  <div class="sec-hero-inner">
    <h1 class="sec-title">Secretarías y Áreas Gremiales</h1>
    <div class="sec-divider"></div>
    <p class="sec-lead">
      Conocé la estructura organizativa de nuestro sindicato y las funciones de cada área según el Estatuto.
    </p>
  </div>
</div>

<div class="sec-container">
  <div class="sec-grid">
    <div class="sec-card" *ngFor="let secretaria of secretarias">
      <div class="sec-card-header">
        <h2 class="sec-card-title">{{ secretaria.titulo }}</h2>
      </div>
      <div class="sec-card-body">
        <ul class="sec-list">
          <li *ngFor="let funcion of secretaria.funciones">
            <i class="fa-solid fa-circle-check sec-check"></i>
            <span>{{ funcion }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
