<!-- HERO -->
<div class="galeria-hero">
  <div class="galeria-hero-inner">
    <span class="galeria-eyebrow">Memoria institucional</span>
    <h1 class="galeria-title">Galería Histórica</h1>
    <div class="galeria-divider"></div>
    <p class="galeria-lead">
      Recorre más de 20 años de nuestra historia, encuentros, actividades y momentos destacados de nuestro gremio.
      Deslizá las imágenes para revivir los eventos y ver cómo hemos crecido juntos.
    </p>
  </div>
</div>

<div class="galeria-container">

  <div class="carousel-card">
    <div class="carousel">
      <button class="nav prev" (click)="prevSlide()">&#10094;</button>

      <div class="slides">
        <img
          *ngFor="let image of images; let i = index"
          [src]="image.src"
          [alt]="image.alt"
          [class.active]="i === currentSlide"
        />
      </div>

      <button class="nav next" (click)="nextSlide()">&#10095;</button>
    </div>

    <div class="dots">
      <span
        *ngFor="let image of images; let i = index"
        [class.active]="i === currentSlide"
        (click)="goToSlide(i)"
      ></span>
    </div>
  </div>
</div>
