<div class="lh-hero">
  <div class="lh-hero-inner">
    <h1 class="lh-title">Logos Institucionales a lo largo de nuestra historia</h1>
    <div class="lh-divider"></div>
    <p class="lh-lead">Estos son algunos de los símbolos que nos representaron en distintas etapas.</p>
  </div>
</div>

<div class="lh-container">
  <div class="lh-grid">
    <div class="lh-card" *ngFor="let logo of logos">
      <div class="lh-img-wrapper">
        <img [src]="logo.image" [alt]="logo.title" class="lh-logo-img" />
      </div>
      <div class="lh-card-body">
        <h3 class="lh-card-title">{{ logo.period }}</h3>
        <p class="lh-card-text">{{ logo.description }}</p>
      </div>
    </div>
  </div>
</div>
