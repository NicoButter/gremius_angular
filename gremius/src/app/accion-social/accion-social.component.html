<!-- HERO -->
<div class="as-hero">
  <div class="as-hero-inner">
    <h1 class="as-title">Acción Social</h1>
    <div class="as-divider"></div>
    <p class="as-lead">
      El sindicato te acompaña en los momentos importantes. Conocé los subsidios disponibles para nuestras afiliadas y afiliados.
    </p>
  </div>
</div>

<div class="as-container">

  <!-- REQUISITOS (PANEL DESTACADO) -->
  <div class="as-alert-panel">
    <div class="as-alert-header">
      <i class="fa-solid fa-circle-exclamation"></i>
      <h2>Requisitos Generales</h2>
    </div>
    <div class="as-alert-body">
      <ul class="as-req-list">
        <li *ngFor="let req of requisitos">
          <i class="fa-solid fa-check"></i>
          <span>{{ req }}</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- SECCIÓN SUBSIDIOS -->
  <div class="as-section-header">
    <i class="fa-solid fa-hand-holding-dollar"></i>
    <h2>Subsidios Vigentes</h2>
  </div>

  <div class="as-grid">
    <!-- CARDS DE SUBSIDIOS -->
    <div class="as-card" *ngFor="let sub of subsidios">
      <div class="as-card-header">
        <div class="as-icon-wrapper">
          <i [class]="sub.icono"></i>
        </div>
        <h3 class="as-card-title">{{ sub.titulo }}</h3>
      </div>
      
      <div class="as-card-body">
        <div class="as-valor-badge">
          <span class="as-valor-amount">{{ sub.valor }}</span>
        </div>
        
        <div class="as-desc-box">
          <i class="fa-regular fa-file-lines"></i>
          <p>{{ sub.descripcion }}</p>
        </div>
      </div>
    </div>
  </div>

</div>
